<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#5a6a80"/>
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Affichage -->
  <rect x="40" y="60" width="432" height="120" rx="20" fill="#000"/>
  <text x="450" y="150" font-family="Arial, sans-serif" font-size="48" fill="#fff" text-anchor="end">0</text>
  
  <!-- Boutons -->
  <g>
    <!-- Ligne 1 -->
    <rect x="40" y="200" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="90" y="265" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">AC</text>
    
    <rect x="160" y="200" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="210" y="265" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">DEL</text>
    
    <rect x="280" y="200" width="100" height="100" rx="20" fill="#f59e0b"/>
    <text x="330" y="265" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">/</text>
    
    <!-- Ligne 2 -->
    <rect x="40" y="320" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="90" y="385" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">7</text>
    
    <rect x="160" y="320" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="210" y="385" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">8</text>
    
    <rect x="280" y="320" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="330" y="385" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">9</text>
    
    <rect x="400" y="320" width="100" height="100" rx="20" fill="#f59e0b"/>
    <text x="450" y="385" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">×</text>
    
    <!-- Ligne 3 -->
    <rect x="40" y="440" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="90" y="505" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">4</text>
    
    <rect x="160" y="440" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="210" y="505" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">5</text>
    
    <rect x="280" y="440" width="100" height="100" rx="20" fill="url(#buttonGradient)"/>
    <text x="330" y="505" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">6</text>
    
    <rect x="400" y="440" width="100" height="100" rx="20" fill="#f59e0b"/>
    <text x="450" y="505" font-family="Arial, sans-serif" font-size="40" fill="#fff" text-anchor="middle">-</text>
  </g>
</svg>
